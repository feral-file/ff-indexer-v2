# FF Indexer GraphQL Schema
# This schema mirrors the RESTful API with the same request/response format

# Scalar types
scalar Time
scalar JSON
scalar Uint64
scalar Uint8

# Order enumeration for sorting
enum Order {
  asc
  desc
}

# TokenSortBy enumeration for token sorting
enum TokenSortBy {
  created_at
  latest_provenance
  mint_number
}

# MediaAssetVariantKey enumeration for variant URL keys
enum MediaAssetVariantKey {
  xs
  s
  m
  l
  xl
  xxl
  hls
  dash
  preview
}

# Artist/Creator information
type Artist {
  did: String!
  name: String!
}

# Publisher information
type Publisher {
  name: String
  url: String
}

# Token metadata
type TokenMetadata {
  token_id: Uint64!
  origin_json: JSON
  latest_json: JSON
  latest_hash: String
  enrichment_level: String!
  last_refreshed_at: Time
  image_url: String
  animation_url: String
  name: String
  description: String
  artists: [Artist!]
  publisher: Publisher
  mime_type: String
  created_at: Time!
  updated_at: Time!
}

# Token owner (balance record)
type Owner {
  owner_address: String!
  quantity: String!
  created_at: Time!
  updated_at: Time!
}

# Provenance event
type ProvenanceEvent {
  id: Uint64!
  token_id: Uint64!
  chain: String!
  event_type: String!
  from_address: String
  to_address: String
  quantity: String
  tx_hash: String
  block_number: Uint64
  block_hash: String
  timestamp: Time!
  raw: JSON
  created_at: Time!
  updated_at: Time!
}

# Paginated owners list
type PaginatedOwners {
  items: [Owner!]!
  offset: Uint64
  total: Uint64!
}

# Paginated provenance events list
type PaginatedProvenanceEvents {
  items: [ProvenanceEvent!]!
  offset: Uint64
  total: Uint64!
}

# Paginated owner provenances list
type PaginatedOwnerProvenances {
  items: [OwnerProvenance!]!
  offset: Uint64
  total: Uint64!
}

# Owner provenance - latest provenance event per owner
type OwnerProvenance {
  owner_address: String!
  last_timestamp: Time!
  last_tx_index: Uint64!
  last_event_type: String!
  created_at: Time!
  updated_at: Time!
}

# Enrichment source data from vendor APIs
type EnrichmentSource {
  token_id: Uint64!
  vendor: String!
  vendor_json: JSON
  vendor_hash: String
  image_url: String
  animation_url: String
  name: String
  description: String
  artists: [Artist!]
  mime_type: String
  created_at: Time!
  updated_at: Time!
}

# Media asset information
type MediaAsset {
  id: Int!
  source_url: String!
  mime_type: String
  file_size_bytes: Int
  provider: String!
  provider_asset_id: String
  provider_metadata: JSON
  variants(keys: [MediaAssetVariantKey!]!): JSON!
  created_at: Time!
  updated_at: Time!
}

# Unified token display data: merges metadata and enrichment source (enrichment takes precedence),
# then applies per-field health filtering via token_media_health. For each URL field
# (animation_url, image_url), only a URL with a "healthy" health row is returned; "broken" and
# "unknown" rows suppress the URL. If no health rows exist yet for a field's source groups the
# raw merged value for that field is returned unchanged.
type TokenDisplay {
  image_url: String
  animation_url: String
  name: String
  description: String
  publisher: Publisher
  artists: [Artist!]
  mime_type: String
}

# Token with optional expansions
type Token {
  id: Uint64!
  token_cid: String!
  chain: String!
  standard: String!
  contract_address: String!
  token_number: String!
  current_owner: String
  burned: Boolean!
  viewable: Boolean!
  last_provenance_timestamp: Time
  release_id: Uint64
  mint_number: Int
  created_at: Time!
  updated_at: Time!
  display: TokenDisplay
  metadata: TokenMetadata
  owners: PaginatedOwners
  provenance_events: PaginatedProvenanceEvents
  owner_provenances: PaginatedOwnerProvenances
  enrichment_source: EnrichmentSource
  media_assets: [MediaAsset!]
}

# Paginated tokens list
type TokenList {
  items: [Token!]!
  offset: Uint64
  total: Uint64! @deprecated(reason: "reason: Use the offset as the indicator for next page")
}

# Paginated releases list (metadata only; use release(id) for members)
type ReleaseList {
  items: [ReleaseSummary!]!
  offset: Uint64
}

# Release metadata without members (list responses)
type ReleaseSummary {
  id: Uint64!
  vendor: String!
  vendor_release_id: String!
  # URL slug from the vendor's website (e.g. "fidenza-by-tyler-hobbs"). Null when not yet enriched.
  # For objkt, equals vendor_release_id (KT1 address).
  vendor_release_slug: String
  name: String
  total_mints: Int
}

# Cross-vendor release (FF series, AB project)
type Release {
  id: Uint64!
  vendor: String!
  vendor_release_id: String!
  # URL slug from the vendor's website (e.g. "fidenza-by-tyler-hobbs"). Null when not yet enriched.
  # For objkt, equals vendor_release_id (KT1 address).
  vendor_release_slug: String
  # Human-readable release title (e.g. "Fidenza"); REST GET /api/v1/releases/{id} `name`.
  name: String
  # Declared max edition size from vendor; REST GET /api/v1/releases/{id} `total_mints`.
  total_mints: Int
  members(limit: Uint8 = 20, offset: Uint64 = 0, sort_order: Order = asc): TokenList!
}

# Result of triggering indexing
type TriggerIndexingResult {
  job_id: Int!
  # Deprecated: same as str(job_id); prefer job_id for new clients.
  workflow_id: String! @deprecated(reason: "Use job_id. Stored opaque correlation id (decimal jobs.id or legacy Temporal string).")
  # Deprecated: always null for postgres-queue jobs; kept for legacy response shape named run_id on older clients.
  run_id: String @deprecated(reason: "Unused for queue-backed jobs; always null.")
}

# Address indexing job information
type AddressIndexingJobInfo {
  address: String!
  job_id: Int!
  # Deprecated: same as str(job_id); prefer job_id for new clients.
  workflow_id: String! @deprecated(reason: "Use job_id. Stored opaque correlation id (decimal jobs.id or legacy Temporal string).")
}

# Result of triggering address indexing (returns array of jobs)
type TriggerAddressIndexingResult {
  jobs: [AddressIndexingJobInfo!]!
}

# Job status information
type JobStatus {
  job_id: Int!
  status: String!
  last_error: String
  start_time: Time
  close_time: Time
  execution_time_ms: Uint64
}

# Root Query type
type Query {
  # Get a single token by CID
  # Equivalent to: GET /api/v1/tokens/:cid
  # Expansions are inferred from requested fields (metadata, owners, provenance_events, etc.).
  token(
    cid: String!
    owners_limit: Uint8 = 10
    owners_offset: Uint64 = 0
    provenance_events_limit: Uint8 = 10
    provenance_events_offset: Uint64 = 0
    provenance_events_order: Order = desc
  ): Token

  # List tokens with filters
  # Equivalent to: GET /api/v1/tokens
  # Expansions are inferred from requested fields on each token.
  # For list queries, owners and provenance_events return a fixed number of items per token (first 20); use `token` for full pagination.
  tokens(
    owners: [String!]
    chains: [String!]
    contract_addresses: [String!]
    token_numbers: [String!]
    token_ids: [Uint64!]
    token_cids: [String!]
    # release_id, release_vendor, and release_vendor_slug are all optional and ANDed.
    # Any one of them is sufficient to enable sort_by=mint_number and mint_from/mint_to.
    release_id: Uint64
    # release_vendor filters tokens to releases from a given vendor (e.g. "artblocks").
    release_vendor: String
    # release_vendor_slug filters tokens to the release whose vendor_release_slug matches
    # (e.g. "fidenza-by-tyler-hobbs"). Case-sensitive.
    release_vendor_slug: String
    # mint_from and mint_to are 1-based mint range filters (inclusive).
    # Require at least one of release_id, release_vendor, or release_vendor_slug.
    # Clients use these to poll for indexed tokens after triggerReleaseIndexing.
    mint_from: Int
    mint_to: Int
    limit: Uint8 = 20
    offset: Uint64 = 0
    include_unviewable: Boolean = false
    sort_by: TokenSortBy = latest_provenance
    sort_order: Order = desc
  ): TokenList

  # Get a release by internal id with mint-ordered members
  # Equivalent to: GET /api/v1/releases/:id
  release(id: Uint64!): Release

  # List releases filtered by ids, vendor, vendor_release_id, and/or vendor_release_slug (metadata only)
  # Equivalent to: GET /api/v1/releases?ids=1&ids=2&vendor=...&vendor_release_id=...&vendor_release_slug=...
  # At least one of ids, vendor, vendor_release_id, or vendor_release_slug is required.
  releases(
    ids: [Uint64!]
    vendor: String
    vendor_release_id: String
    # URL slug from the vendor's website. Can be used instead of vendor_release_id.
    vendor_release_slug: String
    limit: Uint8 = 20
    offset: Uint64 = 0
  ): ReleaseList!

  # Get job status by job id
  # Equivalent to: GET /api/v1/jobs/:job_id
  jobStatus(job_id: Int!): JobStatus

  # Legacy: same as jobStatus when workflow_id is the decimal string of jobs.id; run_id is ignored.
  # Equivalent to: GET /api/v1/workflows/:workflow_id/runs/:run_id
  workflowStatus(
    # Deprecated argument name: decimal string of jobs.id only (same as GET /api/v1/workflows/:workflow_id).
    workflow_id: String!
    run_id: String
  ): JobStatus @deprecated(reason: "Use jobStatus(job_id). workflow_id must be the decimal string of jobs.id; run_id is optional and ignored for queue-backed jobs.")

  # Get address indexing job by queue job id or by deprecated workflow_id (decimal jobs.id or stored opaque string)
  # Equivalent to: GET /api/v1/indexing/jobs/:job_id
  indexingJob(
    job_id: Int
    # Deprecated: use job_id; may pass decimal jobs.id or the stored workflow_id string (e.g. legacy Temporal id).
    workflow_id: String @deprecated(reason: "Use job_id instead when possible; workflow_id accepts legacy opaque strings stored on the row.")
  ): IndexingJob

  # Sync collection state for an address using checkpoint-based pagination (open, no authentication required)
  # Returns token events (acquisitions, releases, attribute updates) since the checkpoint
  # Equivalent to: GET /api/v1/collection/:address/sync?checkpoint_timestamp=<timestamp>&checkpoint_event_id=<id>
  # 
  # For initial sync, omit checkpoint parameters (or pass null)
  # For pagination, use the next_checkpoint from previous response
  # When next_checkpoint is null and has_more is false, client has caught up
  syncCollection(
    address: String!
    checkpoint_timestamp: Time
    checkpoint_event_id: Uint64
    limit: Uint8
  ): SyncCollectionResult
}

# Root Mutation type
type Mutation {
  # Trigger indexing for tokens by CIDs (open, no authentication required)
  # Equivalent to: POST /api/v1/tokens/index
  triggerTokenIndexing(
    token_cids: [String!]!
  ): TriggerIndexingResult

  # Trigger indexing for tokens by owner addresses with job tracking (requires authentication)
  # Equivalent to: POST /api/v1/tokens/addresses/index
  # Returns an array of per-address entries with job_id for tracking indexing progress
  triggerAddressIndexing(
    addresses: [String!]!
  ): TriggerAddressIndexingResult

  # Trigger metadata refresh for tokens by IDs or CIDs (open, no authentication required)
  # Equivalent to: POST /api/v1/tokens/metadata/index
  # At least one of token_ids or token_cids must be provided
  triggerMetadataIndexing(
    token_ids: [Uint64!]
    token_cids: [String!]
  ): TriggerIndexingResult

  # Trigger asynchronous indexing for all tokens in a vendor release within a mint range.
  # Equivalent to: POST /api/v1/releases/index
  # Phase 1 (CID derivation + IndexTokens fan-out) runs as a background job; poll job status with job_id.
  # After Phase 1 succeeds, poll tokens(release_id, mint_from, mint_to, include_unviewable: true) to track completion.
  # Alternatively use tokens(release_vendor_slug: "...", mint_from, mint_to, include_unviewable: true) without needing release_id.
  # vendor: one of artblocks | feralfile | fxhash | objkt (opensea not supported for release indexing)
  # Provide exactly one of vendor_release_id or vendor_release_slug.
  # mint_from: 1-based first mint number (default 1)
  # mint_to: 1-based last mint number (required)
  triggerReleaseIndexing(
    vendor: String!
    vendor_release_id: String
    # URL slug from the vendor's website. The indexer resolves the slug to a vendor_release_id.
    # For objkt, use the KT1 contract address (same as vendor_release_id).
    vendor_release_slug: String
    mint_from: Int
    mint_to: Int!
  ): TriggerIndexingResult

  # Create a new webhook client (requires API key authentication only, JWT not accepted)
  # Equivalent to: POST /api/v1/webhooks/clients
  createWebhookClient(
    webhook_url: String!
    event_filters: [String!]!
    retry_max_attempts: Int
  ): WebhookClientResult
}

# Checkpoint for cursor-based pagination
type SyncCheckpoint {
  # Timestamp: filters events with created_at >= this value
  timestamp: Time!
  # Event ID for tie-breaking: when created_at = timestamp, only events with id > event_id are included
  event_id: Uint64!
}

type SyncCollectionResult {
  # All token events (acquisitions, releases, attribute updates) since checkpoint
  # Ordered by occurred_at (chronological event time) for proper timeline display
  events: [TokenEvent!]!
  # Next checkpoint for continuing pagination or next sync cycle
  # Null only if no events were returned
  next_checkpoint: SyncCheckpoint
  # Server time when query executed
  server_time: Time!
}

# Token event for collection sync
type TokenEvent {
  # Event ID
  id: Uint64!
  # Token ID
  token_id: Uint64!
  # Event type: acquired, released, metadata_updated, enrichment_updated, viewability_changed
  event_type: String!
  # Owner address (NULL for attribute events that broadcast to all current owners)
  owner_address: String
  # When the event occurred
  occurred_at: Time!
  # Lightweight metadata (JSONB)
  metadata: JSON
}

# Webhook client result
type WebhookClientResult {
  client_id: String!
  webhook_url: String!
  webhook_secret: String!
  event_filters: [String!]!
  is_active: Boolean!
  retry_max_attempts: Int!
  created_at: Time!
  updated_at: Time!
}

# Address indexing job
type IndexingJob {
  job_id: Int!
  # Deprecated: stored correlation id (decimal jobs.id or legacy opaque string); prefer job_id.
  workflow_id: String! @deprecated(reason: "Use job_id. Stored opaque correlation id (decimal jobs.id or legacy Temporal string).")
  address: String!
  chain: String!
  status: String!
  tokens_processed: Int!
  total_tokens_indexed: Int
  total_tokens_viewable: Int
  current_min_block: Uint64
  current_max_block: Uint64
  started_at: Time!
  paused_at: Time
  completed_at: Time
  failed_at: Time
  canceled_at: Time
}
