name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag suffix for images (e.g., v1.2.3, dev, staging)"
        required: true
        type: string
  push:
    tags:
      - "v*"

env:
  ECR_REGISTRY: 083397868157.dkr.ecr.us-west-2.amazonaws.com
  ECR_REPOSITORY: ff-indexer
  AWS_REGION: us-west-2

jobs:
  build-and-push:
    name: Build ff-indexer
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for AWS OIDC (only if using role-to-assume)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN_USW2 }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify AWS credentials and ECR permissions
        run: |
          echo "Verifying AWS authentication..."
          aws sts get-caller-identity

          echo "Checking ECR repository..."
          if aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "✅ ECR repository '${{ env.ECR_REPOSITORY }}' exists"

            # Check repository policy
            echo "Checking repository permissions..."
            aws ecr get-repository-policy --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} || echo "No repository policy set"
          else
            echo "❌ ECR repository '${{ env.ECR_REPOSITORY }}' not found"
            echo "Creating ECR repository..."
            aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 || true
          fi

      - name: Determine tag
        id: determine-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            # Extract tag from git ref (refs/tags/v1.2.3 -> v1.2.3)
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using tag: ${TAG}"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=raw,value=ff-indexer-${{ steps.determine-tag.outputs.tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./tools/docker/Dockerfile-ff-indexer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CGO_ENABLED=1
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ steps.determine-tag.outputs.tag }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
          provenance: false

      - name: Image digest
        run: echo "Built and pushed ff-indexer - ${{ steps.meta.outputs.tags }}"

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-and-push.result }}" = "success" ]; then
            echo "✅ Image built and pushed successfully!"
          else
            echo "❌ Image build failed"
            exit 1
          fi

      - name: Output image tags
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "## Built image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| ff-indexer | \`${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:ff-indexer-${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Helm-style reference" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`yaml" >> $GITHUB_STEP_SUMMARY
          echo "global:" >> $GITHUB_STEP_SUMMARY
          echo "  imageRegistry: ${{ env.ECR_REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "image:" >> $GITHUB_STEP_SUMMARY
          echo "  repository: ${{ env.ECR_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          echo "  tag: ff-indexer-${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
